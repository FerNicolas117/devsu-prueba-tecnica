name: CI/CD - Build, Test & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test-ms-clientes:
    name: Test ms-clientes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: Run tests ms-clientes
        working-directory: ./ms-clientes
        run: mvn clean verify -B

  test-ms-cuentas:
    name: Test ms-cuentas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: Run tests ms-cuentas
        working-directory: ./ms-cuentas
        run: mvn clean verify -B

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [ test-ms-clientes, test-ms-cuentas ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd devsu-prueba-tecnica
            git pull origin main
            docker compose up -d --build
            docker image prune -f